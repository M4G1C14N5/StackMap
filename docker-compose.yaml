services:
  stackmap:
    build: .
    restart: always
    environment:
      - NODE_ENV=production
      - DATABASE_URL
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      - POSTGRES_USER=stackmap
      - POSTGRES_DB=stackmap
      - POSTGRES_PASSWORD
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
